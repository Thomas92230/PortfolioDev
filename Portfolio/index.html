<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Icham BOUDEHANE - Développeur Front</title>
  <meta name="description" content="Portfolio d'Icham BOUDEHANE, développeur front et concepteur d'applications spécialisé en React">
  <link rel="icon" href="favicon.ico">
  
  <!-- Font Awesome pour les icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');
    
    * {
      font-family: 'Montserrat', sans-serif;
    }

    .hero-gradient {
      background: linear-gradient(135deg, #0a001b 0%, #1a003d 100%);
    }

    .fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .fade-in-word {
      animation: fadeInWord 0.6s ease-out forwards;
      opacity: 0;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInWord {
      from {
        opacity: 0;
        transform: translateX(10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .project-card {
      transition: all 0.3s ease;
      border: 1px solid rgba(43, 105, 251, 0.12);
      box-shadow: 0 0 1rem 1rem rgba(43, 105, 251, 0.06);
    }

    .project-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(43, 105, 251, 0.15);
    }

    .project-image {
      overflow: hidden;
      border-radius: 0.8rem;
      height: 200px;
    }

    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .project-card:hover .project-image img {
      transform: scale(1.1);
    }

    .text-gradient {
      background: linear-gradient(135deg, #2b69fb 0%, #0a001b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2b69fb 0%, #1a4dd6 100%);
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(43, 105, 251, 0.3);
    }

    svg-curve {
      display: block;
      width: 100%;
      height: auto;
    }

    .slider-container {
      animation: scroll-left 15s linear infinite;
    }

    /* Animation plus rapide sur mobile */
    @media (max-width: 768px) {
      .slider-container {
        animation: scroll-left 5s linear infinite;
      }
    }

    @keyframes scroll-left {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }

    .tech-card {
      transition: all 0.3s ease;
    }

    .tech-card:hover {
      transform: scale(1.03) translateY(-2px);
      box-shadow: 0 10px 25px rgba(43, 105, 251, 0.15);
    }

    .tech-card:hover i {
      transform: scale(1.1);
      transition: transform 0.3s ease;
    }
  </style>
</head>
<body class="bg-white text-slate-900">
  <div id="app"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
